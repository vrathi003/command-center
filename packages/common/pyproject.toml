[project]
name = "finance-common"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "aiosqlite>=0.20",
    "openai>=1.60",
    "pydantic>=2.10",
    "pydantic-settings>=2.7",
    "loguru>=0.7",
    "pymupdf>=1.24",
    "pikepdf>=8.0",
    "pypdf>=5.0",
    "pdfplumber>=0.11",
    "python-dotenv>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/finance_common"]

[tool.hatch.build]
include = ["src/finance_common/db/schema.sql"]
