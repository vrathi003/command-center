[project]
name = "finance-bot"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "finance-common",
    "discord.py>=2.4",
    "apscheduler>=3.10",
    "openai>=1.60",
    "httpx>=0.28",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/finance_bot"]
