[project]
name = "finance-api"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "finance-common",
    "fastapi[standard]>=0.115",
    "uvicorn[standard]>=0.34",
    "httpx>=0.28",
    "apscheduler>=3.10",
    "yfinance>=0.2.40",
    "openpyxl>=3.1",
    "pandas>=2.2",
    "xlrd>=2.0",
    "reportlab>=4.2",
    "msoffcrypto-tool>=6.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/finance_api"]
